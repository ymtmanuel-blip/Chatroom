<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL_V15_P2P</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root {
            --hacker-green: #00ff41;
            --dark-bg: #000000;
        }

        body, html { 
            background: var(--dark-bg); 
            color: var(--hacker-green); 
            font-family: 'Fira Code', monospace; 
            text-transform: uppercase; 
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        #chat-box { 
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            scrollbar-width: none;
        }
        #chat-box::-webkit-scrollbar { display: none; }

        .msg { 
            border-left: 2px solid var(--hacker-green); 
            background: rgba(0, 255, 65, 0.05); 
            padding: 8px 12px; 
            margin-bottom: 8px; 
            font-size: 12px;
            word-break: break-all;
        }

        /* Zensur-Effekt */
        .censored-msg { filter: blur(6px) brightness(0.4); opacity: 0.7; }
        
        .rainbow-text {
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            animation: rainbow 3s linear infinite;
            background-size: 400% 100%;
        }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            background: #080808;
            padding: 10px 5px env(safe-area-inset-bottom);
            border-top: 1px solid #1a1a1a;
        }

        .key {
            background: #111;
            border: 1px solid #222;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: bold;
            border-radius: 4px;
        }
        .key:active { background: var(--hacker-green); color: black; }
        .key-space { grid-column: span 6; background: #1a1a1a; }

        #admin-overlay, #connect-overlay {
            display: none; position: fixed; inset: 0; background: black; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .num-btn { width: 65px; height: 65px; border: 1px solid var(--hacker-green); display: flex; justify-content: center; align-items: center; font-size: 20px; border-radius: 50%; margin: 8px; }
        .hacker-fx { filter: invert(1) blur(3px); transition: 0.1s; }
    </style>
</head>
<body>

    <div id="app-container" class="h-full flex flex-col">
        <!-- Top Bar -->
        <div class="p-3 border-b border-green-900 flex justify-between items-center text-[9px]">
            <div class="flex items-center gap-2">
                <div id="status-dot" class="w-2 h-2 bg-red-500 rounded-full"></div>
                MY_ID: <span id="my-id" class="font-bold">...</span>
            </div>
            <div class="flex gap-2">
                <button onclick="openConnect()" class="border border-green-800 px-2 py-1">CONNECT_PEER</button>
                <button onclick="openAdmin()" class="border border-yellow-800 px-2 py-1">#</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-box">
            <div class="msg opacity-40">[SYSTEM]: P2P_ENGINE_LOADED</div>
            <div class="msg opacity-40">[SYSTEM]: NO_FIREBASE_DEPENDENCY</div>
        </div>

        <!-- Input -->
        <div class="px-4 py-2 bg-black border-t border-green-950">
            <div class="flex items-center">
                <span class="mr-2 text-green-500 font-bold">></span>
                <div id="display-input" class="flex-grow min-h-[1.2rem] text-sm break-all font-bold"></div>
            </div>
            <div id="spam-label" class="text-[8px] text-red-600 h-3 mt-1 uppercase"></div>
        </div>

        <button id="send-btn" onclick="sendChatMessage()" class="mx-4 mb-2 py-3 border border-green-500 font-bold text-[10px] disabled:opacity-20 bg-green-500/10" disabled>DATA_PUSH</button>

        <!-- Keyboard -->
        <div class="keyboard">
            <script>
                "QWERTZUIOPASDFGHJKLYXCVBNM!? ".split("").forEach(c => {
                    document.write(`<div class="key ${c===' '?'key-space':''}" onclick="typeChar('${c}')">${c===' '?'SPACE':c}</div>`);
                });
            </script>
            <div class="key col-span-2 text-red-500" onclick="typeChar('BCK')">BACK</div>
            <div class="key col-span-2 text-red-500" onclick="typeChar('CLR')">CLR</div>
        </div>
    </div>

    <!-- Admin Overlay -->
    <div id="admin-overlay">
        <div id="pin-dots" class="text-3xl mb-10 tracking-[10px]">----</div>
        <div class="grid grid-cols-3">
            <script>
                [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(v => {
                    document.write(`<div class="num-btn" onclick="handlePin('${v}')">${v}</div>`);
                });
            </script>
        </div>
        <button onclick="closeAdmin()" class="mt-8 opacity-40 text-[10px]">CANCEL</button>
    </div>

    <!-- Connect Overlay -->
    <div id="connect-overlay" class="p-6 text-center">
        <div class="text-xs mb-4">ENTER_FRIEND_ID_TO_CONNECT</div>
        <input id="peer-input" type="text" class="bg-black border border-green-500 p-2 text-center text-green-500 w-full mb-4 focus:outline-none">
        <div class="flex gap-4">
            <button onclick="connectToPeer()" class="border border-green-500 px-6 py-2 flex-1">LINK</button>
            <button onclick="closeConnect()" class="border border-red-900 px-6 py-2 flex-1">EXIT</button>
        </div>
    </div>

    <script>
        let peer;
        let connections = [];
        let curText = "";
        let pin = "";
        let isOwner = false;
        let lastSend = 0;
        const badWords = ["arsch", "hurensohn", "wichser", "bastard", "fuck", "scheiße", "pisser"];

        const chat = document.getElementById('chat-box');
        const display = document.getElementById('display-input');
        const sendBtn = document.getElementById('send-btn');
        const myIdDisplay = document.getElementById('my-id');
        const dot = document.getElementById('status-dot');

        // PeerJS Initialisierung (Eigener Server-Knoten wird gesucht)
        function initPeer() {
            // Zufällige 4-stellige ID
            const randomId = Math.floor(1000 + Math.random() * 9000).toString();
            peer = new Peer('T-' + randomId);

            peer.on('open', (id) => {
                myIdDisplay.innerText = id;
                dot.classList.remove('bg-red-500');
                dot.classList.add('bg-green-500');
                addSysMsg("UPLINK_READY: " + id);
            });

            peer.on('connection', (conn) => {
                addSysMsg("NEW_PEER_LINKED");
                setupConn(conn);
            });
            
            peer.on('error', () => {
                addSysMsg("ID_TAKEN_RETRYING...");
                setTimeout(initPeer, 1000);
            });
        }

        function setupConn(conn) {
            connections.push(conn);
            conn.on('data', (data) => {
                if(data.type === 'msg') renderMsg(data);
                if(data.type === 'hacker') triggerHackerFX();
            });
            conn.on('close', () => {
                connections = connections.filter(c => c !== conn);
                addSysMsg("PEER_DISCONNECTED");
            });
        }

        async function connectToPeer() {
            const id = document.getElementById('peer-input').value;
            if(!id) return;
            const conn = peer.connect(id);
            setupConn(conn);
            closeConnect();
            addSysMsg("CONNECTING_TO: " + id);
        }

        function typeChar(c) {
            if(c === 'BCK') curText = curText.slice(0,-1);
            else if(c === 'CLR') curText = "";
            else if(curText.length < 80) curText += c;
            display.innerText = curText;
            sendBtn.disabled = !curText.trim();
        }

        function sendChatMessage() {
            const now = Date.now();
            if(now - lastSend < 1500) {
                document.getElementById('spam-label').innerText = "ANTI_SPAM_PROTECTION_WAIT";
                return;
            }
            document.getElementById('spam-label').innerText = "";
            lastSend = now;

            const payload = {
                type: 'msg',
                user: isOwner ? "YMT [OWNER]" : "USER_" + myIdDisplay.innerText,
                text: curText,
                owner: isOwner,
                hacker: false
            };

            // An alle verbundenen schicken
            connections.forEach(c => c.send(payload));
            renderMsg(payload); // Selbst anzeigen
            curText = ""; typeChar('');
        }

        function renderMsg(m) {
            const isBad = !m.hacker && badWords.some(w => m.text.toLowerCase().includes(w));
            const d = document.createElement('div');
            d.className = `msg ${m.hacker ? 'border-red-600 text-red-500 font-bold' : ''} ${isBad ? 'censored-msg' : ''}`;
            
            const uClass = m.owner ? 'rainbow-text' : 'font-bold';
            const tClass = m.owner ? 'rainbow-text' : '';
            
            d.innerHTML = `[<span class="${uClass}">${m.user}</span>]: <span class="${tClass}">${m.text}</span>`;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function addSysMsg(t) {
            const d = document.createElement('div');
            d.className = "msg opacity-30 italic";
            d.innerHTML = "[SYS]: " + t;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        // Hacker Event (Wird unzensiert verschickt)
        function triggerHackerFX() {
            document.body.classList.add('hacker-fx');
            let count = 0;
            const iv = setInterval(() => {
                renderMsg({user: 'HACKER', text: 'YOU ARE AN IDIOT :)', owner: false, hacker: true});
                count++;
                if(count > 60) {
                    clearInterval(iv);
                    setTimeout(() => document.body.classList.remove('hacker-fx'), 1500);
                }
            }, 30);
        }

        setInterval(() => {
            if(Math.random() > 0.98) {
                triggerHackerFX();
                connections.forEach(c => c.send({type: 'hacker'}));
            }
        }, 30000);

        // UI Steuerungen
        window.openAdmin = () => { document.getElementById('admin-overlay').style.display='flex'; pin=""; updatePin(); };
        window.closeAdmin = () => { document.getElementById('admin-overlay').style.display='none'; };
        window.openConnect = () => { document.getElementById('connect-overlay').style.display='flex'; };
        window.closeConnect = () => { document.getElementById('connect-overlay').style.display='none'; };

        window.handlePin = (v) => {
            if(v==='C') pin="";
            else if(v==='OK') {
                if(pin==='2019') { isOwner=true; closeAdmin(); addSysMsg("OWNER_ACCESS_GRANTED"); }
                else pin="";
            } else if(pin.length < 4) pin += v;
            updatePin();
        };
        function updatePin() { document.getElementById('pin-dots').innerText = "*".repeat(pin.length) || "----"; }

        // Start
        initPeer();
    </script>
</body>
</html>
