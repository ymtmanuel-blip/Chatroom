<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACKER_TERMINAL_V8</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root {
            --hacker-green: #00ff41;
            --dark-bg: #050505;
        }

        body { 
            background: var(--dark-bg); 
            color: var(--hacker-green); 
            font-family: 'Fira Code', monospace; 
            text-transform: uppercase; 
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            touch-action: manipulation;
        }

        .terminal-border { border: 2px solid var(--hacker-green); box-shadow: 0 0 15px #003b0f; }
        
        #chat-box { 
            flex-grow: 1;
            overflow-y: auto;
            scrollbar-width: none;
            transition: filter 0.3s ease;
            padding: 15px;
        }
        #chat-box::-webkit-scrollbar { display: none; }

        .censored { filter: blur(5px) brightness(0.6); pointer-events: none; }
        
        .msg { 
            border-left: 3px solid var(--hacker-green); 
            background: rgba(0, 255, 65, 0.05); 
            padding: 8px 12px; 
            margin-bottom: 8px; 
            font-size: 0.75rem;
            word-break: break-all;
        }

        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            animation: rainbow 3s linear infinite;
            background-size: 500% 100%;
        }

        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 3px;
            background: #000;
            padding: 8px;
            border-top: 1px solid #1a1a1a;
        }

        .key {
            background: #0d0d0d;
            border: 1px solid #222;
            color: var(--hacker-green);
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            cursor: pointer;
            border-radius: 3px;
        }
        .key:active { background: var(--hacker-green); color: black; }
        .key-space { grid-column: span 6; background: #1a1a1a; }
        .key-special { color: #ff3333; border-color: #441111; }

        #secret-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.99);
            z-index: 5000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .num-btn {
            width: 65px; height: 65px; border: 1px solid var(--hacker-green);
            display: flex; justify-content: center; align-items: center;
            font-size: 1.2rem; cursor: pointer;
        }

        #pro-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 6000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loader-bar { width: 70%; height: 8px; border: 1px solid #333; margin-top: 15px; }
        .loader-fill { width: 0%; height: 100%; background: var(--hacker-green); }

        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="p-3 flex justify-between items-center border-b border-green-900 bg-black">
        <div class="text-[9px] flex items-center gap-2">
            <div class="w-1.5 h-1.5 bg-green-500 rounded-full blink"></div>
            SYSTEM_V8: LIVE
        </div>
        <div class="flex gap-2">
            <button id="music-btn" class="text-[8px] border border-green-800 px-2 py-1 rounded">8-BIT: OFF</button>
            <button onclick="triggerPro()" class="text-[8px] border border-yellow-500 px-2 py-1 rounded text-yellow-500 font-bold">GET PRO</button>
        </div>
    </div>

    <!-- Chat Bereich -->
    <div id="chat-box">
        <div class="msg opacity-30">[SYSTEM]: NODE_INITIALIZED_V8.0</div>
        <div class="msg opacity-30">[SYSTEM]: OFFLINE_MODE_ENABLED (NO_FIREBASE)</div>
    </div>

    <!-- Pro Modal (404) -->
    <div id="pro-modal">
        <div id="pro-loading" class="flex flex-col items-center w-full">
            <div class="text-xs mb-2">BYPASSING_GATEWAY...</div>
            <div class="loader-bar"><div id="pro-fill" class="loader-fill"></div></div>
        </div>
        <div id="pro-error" class="hidden flex flex-col items-center">
            <h1 class="text-8xl font-bold">404</h1>
            <p class="text-md">ERROR: ENDPOINT NOT FOUND</p>
            <button onclick="closePro()" class="mt-8 border border-white px-6 py-2 text-[10px]">BACK_TO_TERMINAL</button>
        </div>
    </div>

    <!-- Secret PIN Pad -->
    <div id="secret-overlay">
        <div class="text-[10px] mb-4 opacity-50">ADMIN_OVERRIDE_REQUIRED</div>
        <div id="pin-dots" class="text-3xl mb-8 tracking-[10px]">----</div>
        <div class="grid grid-cols-3 gap-3">
            <div class="num-btn" onclick="p('1')">1</div><div class="num-btn" onclick="p('2')">2</div><div class="num-btn" onclick="p('3')">3</div>
            <div class="num-btn" onclick="p('4')">4</div><div class="num-btn" onclick="p('5')">5</div><div class="num-btn" onclick="p('6')">6</div>
            <div class="num-btn" onclick="p('7')">7</div><div class="num-btn" onclick="p('8')">8</div><div class="num-btn" onclick="p('9')">9</div>
            <div class="num-btn text-red-600 border-red-900" onclick="p('C')">C</div><div class="num-btn" onclick="p('0')">0</div><div class="num-btn text-yellow-500 border-yellow-900" onclick="p('OK')">OK</div>
        </div>
        <button onclick="closeSecret()" class="mt-10 text-[9px] underline opacity-20">DISMISS</button>
    </div>

    <!-- Input -->
    <div class="px-3 py-2 bg-black border-t border-green-950">
        <div class="flex items-center">
            <span class="mr-2 text-green-400 font-bold">></span>
            <div id="display-input" class="flex-grow min-h-[1.2rem] text-xs break-all"></div>
        </div>
        <div id="counter" class="text-[8px] text-right text-green-900 mt-1">0/100</div>
    </div>

    <button id="send-btn" class="mx-3 mb-2 py-2 border border-green-500 font-bold text-[10px] disabled:opacity-10 bg-green-950/20" disabled>DATA_UPLOAD</button>

    <!-- Laptop Keyboard Layout -->
    <div class="keyboard">
        <div class="key" onclick="k('Q')">Q</div><div class="key" onclick="k('W')">W</div><div class="key" onclick="k('E')">E</div><div class="key" onclick="k('R')">R</div><div class="key" onclick="k('T')">T</div><div class="key" onclick="k('Z')">Z</div><div class="key" onclick="k('U')">U</div><div class="key" onclick="k('I')">I</div><div class="key" onclick="k('O')">O</div><div class="key" onclick="k('P')">P</div>
        <div class="key" onclick="k('A')">A</div><div class="key" onclick="k('S')">S</div><div class="key" onclick="k('D')">D</div><div class="key" onclick="k('F')">F</div><div class="key" onclick="k('G')">G</div><div class="key" onclick="k('H')">H</div><div class="key" onclick="k('J')">J</div><div class="key" onclick="k('K')">K</div><div class="key" onclick="k('L')">L</div><div class="key key-special" onclick="k('BCK')">←</div>
        <div class="key" onclick="k('Y')">Y</div><div class="key" onclick="k('X')">X</div><div class="key" onclick="k('C')">C</div><div class="key" onclick="k('V')">V</div><div class="key" onclick="k('B')">B</div><div class="key" onclick="k('N')">N</div><div class="key" onclick="k('M')">M</div><div class="key" onclick="k('!')">!</div><div class="key" onclick="k('?')">?</div><div class="key key-special" onclick="k('CLR')">X</div>
        <div class="col-span-2"></div>
        <div class="key key-space" onclick="k(' ')"></div>
        <div class="col-span-2"></div>
    </div>

    <script>
        let cur = "";
        let isOwner = false;
        let pin = "";
        let audioCtx = null;
        let music = false;

        const chat = document.getElementById('chat-box');
        const display = document.getElementById('display-input');
        const sendBtn = document.getElementById('send-btn');

        function addMsg(u, t, pro = false, warn = false) {
            const d = document.createElement('div');
            d.className = `msg ${warn ? 'border-red-600 text-red-500' : ''}`;
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            d.innerHTML = `[${time}] [<span class="${pro ? 'rainbow-text' : 'font-bold'}">${u}</span>]: <span class="${pro ? 'rainbow-text' : ''}">${t}</span>`;
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function k(key) {
            if(key === 'BCK') cur = cur.slice(0,-1);
            else if(key === 'CLR') cur = "";
            else if(cur.length < 100) cur += key;
            display.innerText = cur;
            document.getElementById('counter').innerText = cur.length + "/100";
            sendBtn.disabled = cur.trim().length === 0;
        }

        sendBtn.onclick = () => {
            const user = isOwner ? "YMT [ADMIN/OWNER]" : "ANON_USER";
            addMsg(user, cur, isOwner);
            const input = cur.toLowerCase();
            cur = ""; k('');
            
            // Bot Antwort Simulation
            setTimeout(() => {
                if(input.includes("hallo")) addMsg("ROBOT X", "CONNECTION_ESTABLISHED.");
                else if(input.includes("hack")) addMsg("ADMIN PRO", "MONITORING_THREAT_LEVELS.");
                else addMsg("SYSTEM", "DATA_PACKET_STORED.");
            }, 800);
        };

        // Swipe Up für Geheim-Menü
        let sy = 0;
        let sc = 0;
        window.ontouchstart = e => sy = e.touches[0].clientY;
        window.ontouchend = e => {
            if(sy - e.changedTouches[0].clientY > 160) {
                sc++;
                if(sc >= 2) { 
                    document.getElementById('secret-overlay').style.display = 'flex';
                    sc = 0;
                }
            } else sc = 0;
        };

        window.p = v => {
            if(v === 'C') pin = "";
            else if(v === 'OK') {
                if(pin === '2019') {
                    isOwner = true;
                    addMsg("SYSTEM", "OWNER_MODE: ACTIVE. WELCOME YMT.", true);
                    closeSecret();
                } else pin = "";
            } else if(pin.length < 4) pin += v;
            document.getElementById('pin-dots').innerText = "*".repeat(pin.length) || "----";
        };
        window.closeSecret = () => { document.getElementById('secret-overlay').style.display = 'none'; pin = ""; };

        // Pro Button
        window.triggerPro = () => {
            const m = document.getElementById('pro-modal');
            m.style.display = 'flex';
            document.getElementById('pro-loading').classList.remove('hidden');
            document.getElementById('pro-error').classList.add('hidden');
            const f = document.getElementById('pro-fill');
            f.style.transition = 'none'; f.style.width = '0%';
            setTimeout(() => { f.style.transition = 'width 3s ease-in-out'; f.style.width = '100%'; }, 50);
            setTimeout(() => {
                document.getElementById('pro-loading').classList.add('hidden');
                document.getElementById('pro-error').classList.remove('hidden');
            }, 3500);
        };
        window.closePro = () => document.getElementById('pro-modal').style.display = 'none';

        // Hacker-Angriff (Zensur)
        function triggerHacker() {
            chat.classList.add('censored');
            let i = 0;
            const iv = setInterval(() => {
                addMsg("HACKER", "YOU ARE AN IDIOT :)", false, true);
                i++; if(i > 35) clearInterval(iv);
            }, 40);
            setTimeout(() => chat.classList.remove('censored'), 4000);
        }
        setInterval(() => { if(Math.random() > 0.96) triggerHacker(); }, 12000);

        // Sound Engine
        document.getElementById('music-btn').onclick = () => {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            music = !music;
            document.getElementById('music-btn').innerText = music ? "8-BIT: ON" : "8-BIT: OFF";
            if(music) {
                const play = () => {
                    if(!music) return;
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'square';
                    o.frequency.value = [90, 110, 70, 130][Math.floor(Math.random()*4)];
                    g.gain.setValueAtTime(0.015, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.6);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(); o.stop(audioCtx.currentTime + 0.6);
                    setTimeout(play, 800);
                };
                play();
            }
        };

        // Random Bots alle 10 Sek
        setInterval(() => {
            const b = ["ROBOT X", "CYBER_GHOST", "ADMIN PRO"][Math.floor(Math.random()*3)];
            addMsg(b, "HEARTBEAT_STABLE.", b === "ADMIN PRO");
        }, 10000);
    </script>
</body>
</html>
