<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL_V12_CLOUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit, serverTimestamp, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- KONFIGURATION ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let currentUser = null;
        let isOwner = false;
        let inputCur = "";
        let lastSend = 0;
        let pin = "";

        const badWords = ["arsch", "hurensohn", "wichser", "bastard", "fuck", "scheiße", "pisser"];

        // UI Elemente
        const chatBox = document.getElementById('chat-box');
        const display = document.getElementById('display-input');
        const sendBtn = document.getElementById('send-btn');
        const spamWarn = document.getElementById('spam-warning');

        // 1. Auth & Login
        const init = async () => {
            await signInAnonymously(auth);
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    document.getElementById('node-id').innerText = "NODE: " + user.uid.slice(0, 8);
                    subscribeToMessages();
                }
            });
        };

        // 2. Echtzeit Chat-Listener
        function subscribeToMessages() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            
            onSnapshot(q, (snapshot) => {
                const msgs = [];
                snapshot.forEach(doc => msgs.push(doc.data()));
                
                // Sortieren nach Zeit
                msgs.sort((a, b) => (a.timestamp?.seconds || 0) - (b.timestamp?.seconds || 0));
                
                renderChat(msgs.slice(-50));
            }, (err) => console.error("Firestore Error", err));
        }

        function renderChat(msgs) {
            chatBox.innerHTML = "";
            msgs.forEach(m => {
                const isBad = !m.isHacker && badWords.some(w => m.text.toLowerCase().includes(w));
                const d = document.createElement('div');
                d.className = `msg ${m.isHacker ? 'border-red-600 text-red-500' : ''} ${isBad ? 'censored-msg' : ''}`;
                
                const nameClass = m.isOwner ? 'rainbow-text font-bold' : 'font-bold';
                const textClass = m.isOwner ? 'rainbow-text' : '';
                
                d.innerHTML = `[<span class="${nameClass}">${m.username}</span>]: <span class="${textClass}">${m.text}</span>`;
                chatBox.appendChild(d);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 3. Senden Funktion
        window.sendData = async () => {
            const now = Date.now();
            if (now - lastSend < 1500) {
                spamWarn.innerText = "ANTI_SPAM: WAIT...";
                return;
            }
            if (!inputCur.trim() || !currentUser) return;

            spamWarn.innerText = "";
            lastSend = now;

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    text: inputCur,
                    username: isOwner ? "YMT [OWNER]" : "GUEST_" + currentUser.uid.slice(0, 4),
                    uid: currentUser.uid,
                    isOwner: isOwner,
                    timestamp: serverTimestamp()
                });
                inputCur = "";
                updateDisplay();
            } catch (e) {
                console.error("Send Error", e);
            }
        };

        // Keyboard Logic
        window.k = (char) => {
            if (char === 'BCK') inputCur = inputCur.slice(0, -1);
            else if (char === 'CLR') inputCur = "";
            else if (inputCur.length < 100) inputCur += char;
            updateDisplay();
        };

        function updateDisplay() {
            display.innerText = inputCur;
            sendBtn.disabled = inputCur.trim().length === 0;
        }

        // Admin System
        window.p = (v) => {
            if (v === 'C') pin = "";
            else if (v === 'OK') {
                if (pin === '2019') {
                    isOwner = true;
                    addMsgLocal("SYSTEM", "OWNER_AUTH_OK", true);
                    document.getElementById('secret-overlay').style.display = 'none';
                }
                pin = "";
            } else if (pin.length < 4) pin += v;
            document.getElementById('pin-dots').innerText = "*".repeat(pin.length) || "----";
        };

        function addMsgLocal(u, t, pro) {
            const d = document.createElement('div');
            d.className = "msg opacity-50";
            d.innerHTML = `[SYSTEM]: ${t}`;
            chatBox.appendChild(d);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Hacker Event
        function triggerHacker() {
            const cont = document.getElementById('app-container');
            cont.classList.add('global-hacker');
            let i = 0;
            const iv = setInterval(() => {
                const d = document.createElement('div');
                d.className = "msg border-red-600 text-red-500 font-bold";
                d.innerHTML = `[HACKER]: YOU ARE AN IDIOT :)`;
                chatBox.appendChild(d);
                chatBox.scrollTop = chatBox.scrollHeight;
                i++;
                if(i > 80) {
                    clearInterval(iv);
                    setTimeout(() => cont.classList.remove('global-hacker'), 2000);
                }
            }, 30);
        }
        setInterval(() => { if(Math.random() > 0.98) triggerHacker(); }, 20000);

        window.openAdmin = () => document.getElementById('secret-overlay').style.display = 'flex';
        window.closeAdmin = () => document.getElementById('secret-overlay').style.display = 'none';

        init();
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        body, html { background: #000; color: #00ff41; font-family: 'Fira Code', monospace; height: 100%; overflow: hidden; text-transform: uppercase; }
        .msg { border-left: 2px solid #00ff41; background: rgba(0, 255, 65, 0.05); padding: 8px; margin-bottom: 5px; font-size: 12px; }
        .censored-msg { filter: blur(6px); opacity: 0.5; }
        .global-hacker { filter: invert(1) blur(5px); }
        .rainbow-text { background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet); -webkit-background-clip: text; color: transparent; animation: rainbow 3s linear infinite; background-size: 400% 100%; }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        .keyboard { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; background: #080808; padding: 10px; border-top: 1px solid #1a1a1a; }
        .key { background: #111; border: 1px solid #222; height: 45px; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 4px; }
        .key:active { background: #00ff41; color: #000; }
        #secret-overlay { display: none; position: fixed; inset: 0; background: #000; z-index: 100; flex-direction: column; justify-content: center; align-items: center; }
        .num-btn { width: 60px; height: 60px; border: 1px solid #00ff41; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 10px; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="app-container" class="h-full flex flex-col">
        <!-- Top -->
        <div class="p-3 border-b border-green-900 flex justify-between items-center text-[10px]">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                V12_ONLINE
            </div>
            <div id="node-id">CONNECTING...</div>
        </div>

        <!-- Chat -->
        <div id="chat-box" class="flex-1 overflow-y-auto p-4"></div>

        <!-- Input -->
        <div class="p-4 bg-black border-t border-green-900">
            <div class="flex items-center gap-2 mb-2">
                <span class="font-bold text-green-500">></span>
                <div id="display-input" class="text-sm font-bold h-5"></div>
            </div>
            <div id="spam-warning" class="text-[9px] text-red-500 h-3"></div>
            <button id="send-btn" onclick="sendData()" class="w-full py-3 border border-green-500 text-[10px] mt-2 bg-green-500/10 disabled:opacity-20" disabled>UPLOAD_DATA</button>
        </div>

        <!-- Keyboard -->
        <div class="keyboard pb-10">
            <script>
                const keys = "QWERTZUIOPASDFGHJKLYXCVBNM!? ";
                keys.split("").forEach(char => {
                    document.write(`<div class="key ${char === ' ' ? 'col-span-6' : ''}" onclick="k('${char}')">${char === ' ' ? 'SPACE' : char}</div>`);
                });
            </script>
            <div class="key col-span-2 text-red-500" onclick="k('BCK')">BACK</div>
            <div class="key col-span-2 text-yellow-500" onclick="openAdmin()">ADMIN</div>
        </div>
    </div>

    <!-- Pin Pad -->
    <div id="secret-overlay">
        <div id="pin-dots" class="text-3xl mb-10 tracking-widest">----</div>
        <div class="grid grid-cols-3">
            <script>
                [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(v => {
                    document.write(`<div class="num-btn" onclick="p('${v}')">${v}</div>`);
                });
            </script>
        </div>
        <button onclick="closeAdmin()" class="mt-10 opacity-30 text-xs">EXIT</button>
    </div>

</body>
</html>
