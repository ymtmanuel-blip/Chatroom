<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL_V11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root {
            --hacker-green: #00ff41;
            --dark-bg: #000000;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html { 
            background: var(--dark-bg); 
            color: var(--hacker-green); 
            font-family: 'Fira Code', monospace; 
            text-transform: uppercase; 
            overflow: hidden;
            height: 100%;
            width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            position: relative;
        }

        #chat-box { 
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            scrollbar-width: none;
        }
        #chat-box::-webkit-scrollbar { display: none; }

        .msg { 
            border-left: 2px solid var(--hacker-green); 
            background: rgba(0, 255, 65, 0.05); 
            padding: 8px 12px; 
            margin-bottom: 8px; 
            font-size: 13px;
            word-break: break-all;
        }

        /* Zensur-Effekt für Schimpfwörter */
        .censored-msg { filter: blur(6px) brightness(0.4); opacity: 0.7; }
        
        /* Globaler Hacker-Effekt */
        .global-censored { filter: blur(12px) invert(1); transition: filter 0.1s; }

        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            animation: rainbow 3s linear infinite;
            background-size: 500% 100%;
        }

        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: #080808;
            padding: 8px 5px env(safe-area-inset-bottom);
            border-top: 1px solid #1a1a1a;
        }

        .key {
            background: #111;
            border: 1px solid #222;
            color: var(--hacker-green);
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
        }
        .key:active { background: var(--hacker-green); color: black; }
        .key-space { grid-column: span 6; background: #1a1a1a; }
        .key-special { color: #ff4444; border-color: #551111; }

        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        #secret-overlay {
            display: none; position: fixed; inset: 0; background: black; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .num-btn { width: 70px; height: 70px; border: 1px solid var(--hacker-green); display: flex; justify-content: center; align-items: center; font-size: 20px; border-radius: 50%; }
        
        .spam-notice { font-size: 10px; color: #ff4444; text-align: center; margin-top: 2px; height: 12px; }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Top Bar -->
        <div class="p-3 flex justify-between items-center border-b border-green-900 bg-black">
            <div class="text-[10px] flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full blink"></div>
                V11_STABLE_NODE
            </div>
            <div class="flex gap-2">
                <button id="music-btn" class="text-[9px] border border-green-800 px-3 py-1">AUDIO: OFF</button>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-box">
            <div class="msg opacity-40">[SYSTEM]: VERSION_11_INITIALIZED</div>
            <div class="msg opacity-40">[SYSTEM]: ANTI_SPAM_ACTIVE // NO_BOOT_REQUIRED</div>
        </div>

        <!-- Input Display -->
        <div class="px-4 py-3 bg-black border-t border-green-950">
            <div class="flex items-center">
                <span class="mr-2 text-green-500 font-bold">></span>
                <div id="display-input" class="flex-grow min-h-[1.5rem] text-sm break-all font-bold"></div>
            </div>
            <div id="spam-warning" class="spam-notice"></div>
        </div>

        <button id="send-btn" class="mx-4 mb-2 py-3 border border-green-500 font-bold text-[11px] disabled:opacity-10 bg-green-500/10" disabled>SEND_DATA</button>

        <!-- Keyboard -->
        <div class="keyboard">
            <div class="key" onclick="k('Q')">Q</div><div class="key" onclick="k('W')">W</div><div class="key" onclick="k('E')">E</div><div class="key" onclick="k('R')">R</div><div class="key" onclick="k('T')">T</div><div class="key" onclick="k('Z')">Z</div><div class="key" onclick="k('U')">U</div><div class="key" onclick="k('I')">I</div><div class="key" onclick="k('O')">O</div><div class="key" onclick="k('P')">P</div>
            <div class="key" onclick="k('A')">A</div><div class="key" onclick="k('S')">S</div><div class="key" onclick="k('D')">D</div><div class="key" onclick="k('F')">F</div><div class="key" onclick="k('G')">G</div><div class="key" onclick="k('H')">H</div><div class="key" onclick="k('J')">J</div><div class="key" onclick="k('K')">K</div><div class="key" onclick="k('L')">L</div><div class="key key-special" onclick="k('BCK')">←</div>
            <div class="key" onclick="k('Y')">Y</div><div class="key" onclick="k('X')">X</div><div class="key" onclick="k('C')">C</div><div class="key" onclick="k('V')">V</div><div class="key" onclick="k('B')">B</div><div class="key" onclick="k('N')">N</div><div class="key" onclick="k('M')">M</div><div class="key" onclick="k('!')">!</div><div class="key" onclick="k('?')">?</div><div class="key key-special" onclick="k('CLR')">X</div>
            <div class="col-span-2"></div>
            <div class="key key-space" onclick="k(' ')">SPACE</div>
            <div class="col-span-2"></div>
        </div>
    </div>

    <!-- Secret Admin Login -->
    <div id="secret-overlay">
        <div class="text-[12px] mb-8 tracking-[8px]">OVERRIDE_AUTH</div>
        <div id="pin-dots" class="text-4xl mb-12 tracking-[15px] text-green-400">----</div>
        <div class="grid grid-cols-3 gap-6">
            <div class="num-btn" onclick="p('1')">1</div><div class="num-btn" onclick="p('2')">2</div><div class="num-btn" onclick="p('3')">3</div>
            <div class="num-btn" onclick="p('4')">4</div><div class="num-btn" onclick="p('5')">5</div><div class="num-btn" onclick="p('6')">6</div>
            <div class="num-btn" onclick="p('7')">7</div><div class="num-btn" onclick="p('8')">8</div><div class="num-btn" onclick="p('9')">9</div>
            <div class="num-btn text-red-600 border-red-900" onclick="p('C')">C</div><div class="num-btn" onclick="p('0')">0</div><div class="num-btn text-yellow-500 border-yellow-900" onclick="p('OK')">OK</div>
        </div>
        <button onclick="closeSecret()" class="mt-16 text-[10px] underline opacity-30">DISMISS</button>
    </div>

    <script>
        let cur = "";
        let isOwner = false;
        let pin = "";
        let audioCtx = null;
        let music = false;
        let lastSendTime = 0;

        const badWords = ["arsch", "idiot", "bastard", "hurensohn", "wichser", "pisser", "fuck", "scheiße"];

        const chat = document.getElementById('chat-box');
        const display = document.getElementById('display-input');
        const sendBtn = document.getElementById('send-btn');
        const spamWarn = document.getElementById('spam-warning');

        function addMsg(u, t, pro = false, warn = false, isHacker = false) {
            const d = document.createElement('div');
            
            // Check auf Beleidigung (aber Hacker wird nie zensiert!)
            const isBad = !isHacker && badWords.some(word => t.toLowerCase().includes(word));
            
            d.className = `msg ${warn ? 'border-red-600 text-red-500' : ''} ${isBad ? 'censored-msg' : ''}`;
            
            const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            d.innerHTML = `[${time}] [<span class="${pro ? 'rainbow-text' : 'font-bold'}">${u}</span>]: <span class="${pro ? 'rainbow-text' : ''}">${t}</span>`;
            
            chat.appendChild(d);
            chat.scrollTop = chat.scrollHeight;
        }

        function k(key) {
            if(key === 'BCK') cur = cur.slice(0,-1);
            else if(key === 'CLR') cur = "";
            else if(cur.length < 100) cur += key;
            display.innerText = cur;
            sendBtn.disabled = cur.trim().length === 0;
        }

        sendBtn.onclick = () => {
            const now = Date.now();
            if(now - lastSendTime < 1500) {
                spamWarn.innerText = "ANTI_SPAM: WAIT...";
                return;
            }
            spamWarn.innerText = "";
            lastSendTime = now;

            const user = isOwner ? "YMT [OWNER]" : "GUEST_USER";
            addMsg(user, cur, isOwner);
            const input = cur.toLowerCase();
            cur = ""; k('');
            
            setTimeout(() => {
                if(input.includes("hallo")) addMsg("ROBOT X", "CONNECTION_STABLE.");
                else addMsg("SYSTEM", "DATA_STORED.");
            }, 600);
        };

        // Blitzschneller Hacker-Angriff (UNZENSORIERT)
        function triggerHackerEvent() {
            document.getElementById('app-container').classList.add('global-censored');
            let count = 0;
            const maxSpam = 100; 
            
            const spamInterval = setInterval(() => {
                addMsg("HACKER", "YOU ARE AN IDIOT :)", false, true, true);
                count++;
                if(count >= maxSpam) {
                    clearInterval(spamInterval);
                    setTimeout(() => {
                        document.getElementById('app-container').classList.remove('global-censored');
                    }, 1500);
                }
            }, 20); 
        }

        // Random Hacker Trigger
        setInterval(() => {
            if(Math.random() > 0.95) triggerHackerEvent();
        }, 25000);

        // Geheim Menü Login
        let sy = 0, sc = 0;
        window.ontouchstart = e => sy = e.touches[0].clientY;
        window.ontouchend = e => {
            if(sy - e.changedTouches[0].clientY > 160) {
                sc++;
                if(sc >= 2) { 
                    document.getElementById('secret-overlay').style.display = 'flex';
                    sc = 0;
                }
            } else sc = 0;
        };

        window.p = v => {
            if(v === 'C') pin = "";
            else if(v === 'OK') {
                if(pin === '2019') {
                    isOwner = true;
                    addMsg("SYSTEM", "OWNER_AUTH_GRANTED.", true);
                    closeSecret();
                } else pin = "";
            } else if(pin.length < 4) pin += v;
            document.getElementById('pin-dots').innerText = "*".repeat(pin.length) || "----";
        };
        window.closeSecret = () => { document.getElementById('secret-overlay').style.display = 'none'; pin = ""; };

        // Audio
        document.getElementById('music-btn').onclick = () => {
            if(!audioCtx) audioCtx = new AudioContext();
            music = !music;
            document.getElementById('music-btn').innerText = music ? "AUDIO: ON" : "AUDIO: OFF";
            if(music) {
                const play = () => {
                    if(!music) return;
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'square';
                    o.frequency.value = [90, 110, 80, 130][Math.floor(Math.random()*4)];
                    g.gain.setValueAtTime(0.012, audioCtx.currentTime);
                    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
                    o.connect(g); g.connect(audioCtx.destination);
                    o.start(); o.stop(audioCtx.currentTime + 0.5);
                    setTimeout(play, 750);
                };
                play();
            }
        };
    </script>
</body>
</html>
