<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TERMINAL_V13</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');
        
        :root {
            --hacker-green: #00ff41;
            --dark-bg: #000000;
        }

        body, html { 
            background: var(--dark-bg); 
            color: var(--hacker-green); 
            font-family: 'Fira Code', monospace; 
            text-transform: uppercase; 
            overflow: hidden;
            height: 100%;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        #chat-box { 
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            scrollbar-width: none;
        }
        #chat-box::-webkit-scrollbar { display: none; }

        .msg { 
            border-left: 2px solid var(--hacker-green); 
            background: rgba(0, 255, 65, 0.05); 
            padding: 8px 12px; 
            margin-bottom: 8px; 
            font-size: 13px;
            word-break: break-all;
        }

        .censored-msg { filter: blur(6px) brightness(0.4); opacity: 0.7; }
        
        .rainbow-text {
            background-image: linear-gradient(to left, violet, indigo, blue, green, yellow, orange, red);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: bold;
            animation: rainbow 3s linear infinite;
            background-size: 500% 100%;
        }

        @keyframes rainbow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

        .keyboard {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 4px;
            background: #080808;
            padding: 8px 5px env(safe-area-inset-bottom);
            border-top: 1px solid #1a1a1a;
        }

        .key {
            background: #111;
            border: 1px solid #222;
            color: var(--hacker-green);
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            border-radius: 5px;
        }
        .key:active { background: var(--hacker-green); color: black; }
        .key-space { grid-column: span 6; background: #1a1a1a; }

        #secret-overlay {
            display: none; position: fixed; inset: 0; background: black; z-index: 9999;
            flex-direction: column; justify-content: center; align-items: center;
        }
        .num-btn { width: 70px; height: 70px; border: 1px solid var(--hacker-green); display: flex; justify-content: center; align-items: center; font-size: 20px; border-radius: 50%; margin: 10px; }
        
        .global-hacker { filter: invert(1) blur(2px); transition: 0.1s; }
    </style>
</head>
<body>

    <div id="app-container" class="h-full flex flex-col">
        <!-- Header -->
        <div class="p-3 border-b border-green-900 flex justify-between items-center text-[10px]">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                V13_ONLINE_STABLE
            </div>
            <div id="status-id">INITIALIZING...</div>
        </div>

        <!-- Chat -->
        <div id="chat-box">
            <div class="msg opacity-40">[SYSTEM]: CONNECTING_TO_GLOBAL_RELAY...</div>
        </div>

        <!-- Input -->
        <div class="px-4 py-3 bg-black border-t border-green-950">
            <div class="flex items-center">
                <span class="mr-2 text-green-500 font-bold">></span>
                <div id="display-input" class="flex-grow min-h-[1.5rem] text-sm break-all font-bold"></div>
            </div>
            <div id="spam-warn" class="text-[9px] text-red-600 h-3 mt-1"></div>
        </div>

        <button id="send-btn" onclick="sendMsg()" class="mx-4 mb-2 py-3 border border-green-500 font-bold text-[11px] disabled:opacity-20 bg-green-500/10" disabled>UPLOAD_DATA</button>

        <!-- Tastatur -->
        <div class="keyboard">
            <script>
                const keys = "QWERTZUIOPASDFGHJKLYXCVBNM!? ";
                keys.split("").forEach(c => {
                    document.write(`<div class="key ${c===' '?'key-space':''}" onclick="handleK('${c}')">${c===' '?'SPACE':c}</div>`);
                });
            </script>
            <div class="key col-span-2 text-red-500" onclick="handleK('BCK')">BACK</div>
            <div class="key col-span-2 text-yellow-500" onclick="toggleAdmin()">ADMIN</div>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="secret-overlay">
        <div id="pin-dots" class="text-4xl mb-12 tracking-[15px]">----</div>
        <div class="grid grid-cols-3">
            <script>
                [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(v => {
                    document.write(`<div class="num-btn" onclick="handleP('${v}')">${v}</div>`);
                });
            </script>
        </div>
        <button onclick="toggleAdmin()" class="mt-10 opacity-30 text-xs">EXIT</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, query, limit } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // Firebase Config wird automatisch durch die Umgebung injiziert
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let user = null;
        let isOwner = false;
        let curInput = "";
        let pinInput = "";
        let lastSend = 0;
        const badWords = ["arsch", "hurensohn", "wichser", "bastard", "fuck", "scheiße"];

        const chat = document.getElementById('chat-box');
        const display = document.getElementById('display-input');
        const sendBtn = document.getElementById('send-btn');

        // Login & Realtime Sync
        signInAnonymously(auth).then(() => {
            onAuthStateChanged(auth, (u) => {
                if(u) {
                    user = u;
                    document.getElementById('status-id').innerText = "ID: " + u.uid.slice(0,6);
                    startChat();
                }
            });
        });

        function startChat() {
            const q = collection(db, 'artifacts', appId, 'public', 'data', 'messages');
            onSnapshot(q, (snap) => {
                const msgs = [];
                snap.forEach(doc => msgs.push(doc.data()));
                msgs.sort((a,b) => (a.time?.seconds || 0) - (b.time?.seconds || 0));
                render(msgs.slice(-40));
            });
        }

        function render(msgs) {
            chat.innerHTML = "";
            msgs.forEach(m => {
                const isBad = !m.hacker && badWords.some(w => m.text.toLowerCase().includes(w));
                const d = document.createElement('div');
                d.className = `msg ${m.hacker ? 'border-red-600 text-red-500 font-bold' : ''} ${isBad ? 'censored-msg' : ''}`;
                
                const uClass = m.owner ? 'rainbow-text' : 'font-bold';
                const tClass = m.owner ? 'rainbow-text' : '';
                
                d.innerHTML = `[<span class="${uClass}">${m.user}</span>]: <span class="${tClass}">${m.text}</span>`;
                chat.appendChild(d);
            });
            chat.scrollTop = chat.scrollHeight;
        }

        window.sendMsg = async () => {
            const now = Date.now();
            if(now - lastSend < 1500) return;
            if(!curInput.trim() || !user) return;

            lastSend = now;
            const t = curInput;
            curInput = ""; updateD();

            await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                text: t,
                user: isOwner ? "YMT [OWNER]" : "GUEST_" + user.uid.slice(0,4),
                owner: isOwner,
                time: serverTimestamp()
            });
        };

        window.handleK = (c) => {
            if(c === 'BCK') curInput = curInput.slice(0,-1);
            else if(curInput.length < 80) curInput += c;
            updateD();
        };

        function updateD() {
            display.innerText = curInput;
            sendBtn.disabled = !curInput.trim();
        }

        window.toggleAdmin = () => {
            const el = document.getElementById('secret-overlay');
            el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
            pinInput = ""; updateP();
        };

        window.handleP = (v) => {
            if(v === 'C') pinInput = "";
            else if(v === 'OK') {
                if(pinInput === '2019') {
                    isOwner = true;
                    toggleAdmin();
                    alert("ADMIN_ACCESS_GRANTED");
                } else pinInput = "";
            } else if(pinInput.length < 4) pinInput += v;
            updateP();
        };

        function updateP() { document.getElementById('pin-dots').innerText = "*".repeat(pinInput.length) || "----"; }

        // Hacker Attack
        setInterval(() => {
            if(Math.random() > 0.98) {
                document.body.classList.add('global-hacker');
                setTimeout(() => document.body.classList.remove('global-hacker'), 2000);
            }
        }, 15000);
    </script>
</body>
</html>
